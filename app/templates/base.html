<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFuture | Freelance Solutions</title>
    <meta name="description" content="Soluciones de desarrollo web futuristas y de alto rendimiento. Contacta para cotizar tu próximo proyecto.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="nav-logo">Dev<span style="color: var(--secondary-glow);">Future</span></a>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#cotizar">Cotizar</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DevFuture. Impulsando el mañana, hoy.</p>
            <div style="margin-top: 1rem; font-size: 1.5rem; display: flex; justify-content: center; gap: 1.5rem;">
                <a href="#" style="color: var(--text-secondary);"><i class="fab fa-github"></i></a>
                <a href="#" style="color: var(--text-secondary);"><i class="fab fa-linkedin"></i></a>
                <a href="#" style="color: var(--text-secondary);"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script>
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };
    </script>
</body>
</html>
