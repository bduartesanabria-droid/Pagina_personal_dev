<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230a0a0a'/><text x='50' y='74' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%2300d2ff' text-anchor='middle'>B</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #scrollProgress { position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#00d2ff,#ff7b00,#a855f7);z-index:10000;transition:width 0.08s linear;pointer-events:none; }
        .whatsapp-float { position:fixed;bottom:2rem;right:2rem;width:58px;height:58px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.75rem;color:white;z-index:9998;text-decoration:none;animation:wa-pulse 2.5s ease-in-out infinite;transition:transform 0.3s ease; }
        .whatsapp-float:hover { transform:scale(1.12); }
        .whatsapp-float:hover .wa-tip { opacity:1;transform:translateX(0); }
        .wa-tip { position:absolute;right:70px;background:rgba(10,10,10,0.92);border:1px solid rgba(37,211,102,0.35);color:white;padding:8px 16px;border-radius:8px;font-size:0.82rem;font-weight:700;white-space:nowrap;opacity:0;transform:translateX(10px);transition:all 0.3s ease;pointer-events:none;font-family:'Outfit',sans-serif;letter-spacing:1px; }
        @keyframes wa-pulse { 0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.4),0 0 0 0 rgba(37,211,102,0.25)} 60%{box-shadow:0 6px 30px rgba(37,211,102,0.7),0 0 0 14px rgba(37,211,102,0)} }
    </style>
</head>
<body>
    <div id="scrollProgress"></div>
    <canvas id="particles"></canvas>
    <div class="mouse-glow" id="mouseGlow"></div>

    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">BYDS<span>.DEV</span></a>
            <button class="menu-btn" id="menuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#quienes-somos">Nosotros</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#portafolio">Proyectos</a></li>
                <li><a href="#precios">Precios</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <a href="https://wa.me/573114771700" target="_blank" class="whatsapp-float" aria-label="WhatsApp">
        <i class="fab fa-whatsapp"></i>
        <span class="wa-tip">¡Hablemos!</span>
    </a>

    <footer>
        <div class="container">
            <div class="logo footer-logo">BYDS<span>.DEV</span></div>
            <p style="color: var(--neon-blue); letter-spacing: 5px; font-weight: 800; margin-bottom: 2rem;">IMPULSANDO HACIA EL FUTURO</p>
            <div style="display: flex; justify-content: center; gap: 3rem; margin-bottom: 3rem;">
                <a href="https://github.com/bduartesanabria-droid" target="_blank" style="color: white; font-size: 1.5rem;"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/byds.dev" target="_blank" style="color: white; font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/573114771700" target="_blank" style="color: white; font-size: 1.5rem;"><i class="fab fa-whatsapp"></i></a>
                <a href="mailto:byds.dev@gmail.com" style="color: white; font-size: 1.5rem;"><i class="fas fa-envelope"></i></a>
            </div>
            <p style="color: var(--text-dim); font-size: 0.8rem; opacity: 0.5;">&copy; 2026 BYDS.DEV. Digital Excellence.</p>
        </div>
    </footer>

    <script>
        // Scroll progress bar
        const scrollProg = document.getElementById('scrollProgress');
        window.addEventListener('scroll', () => {
            const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            scrollProg.style.width = pct + '%';
        }, { passive: true });

        // Smooth lagging mouse glow
        const glow = document.getElementById('mouseGlow');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let glowX = mouseX, glowY = mouseY;
        document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        (function lerpGlow() {
            glowX += (mouseX - glowX) * 0.07;
            glowY += (mouseY - glowY) * 0.07;
            glow.style.left = glowX + 'px';
            glow.style.top  = glowY + 'px';
            requestAnimationFrame(lerpGlow);
        })();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        
        menuBtn.onclick = () => {
            navLinks.classList.toggle('active');
            menuBtn.querySelector('i').classList.toggle('fa-bars');
            menuBtn.querySelector('i').classList.toggle('fa-times');
        };

        // Close menu on click
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.onclick = () => {
                navLinks.classList.remove('active');
                menuBtn.querySelector('i').classList.add('fa-bars');
                menuBtn.querySelector('i').classList.remove('fa-times');
            };
        });

        // Mouse glow handled by smooth lerp above

        // Navbar Scroll
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        // Text scramble effect for section titles
        function scramble(el) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@$%';
            const final = el.dataset.scramble;
            let step = 0;
            const total = final.length * 4;
            const iv = setInterval(() => {
                el.textContent = final.split('').map((ch, i) => {
                    if (ch === ' ') return ' ';
                    if (i < step / 4) return final[i];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                if (++step > total) { el.textContent = final; clearInterval(iv); }
            }, 28);
        }

        const scrambleObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !entry.target.dataset.done) {
                    entry.target.dataset.done = '1';
                    scramble(entry.target);
                }
            });
        }, { threshold: 0.6 });

        // 3D card tilt
        function initTilt() {
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const r = card.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
                    const y = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
                    card.style.transform = `perspective(900px) rotateX(${-y * 5}deg) rotateY(${x * 5}deg) translateZ(8px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            document.querySelectorAll('.section-title').forEach(el => {
                el.dataset.scramble = el.textContent;
                scrambleObserver.observe(el);
            });
            initTilt();
        });

        // Connected Particle Network
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let pMouse = { x: -9999, y: -9999 };

        document.addEventListener('mousemove', e => { pMouse.x = e.clientX; pMouse.y = e.clientY; });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.55 + 0.1;
            }
            update() {
                // Subtle attraction to mouse
                const dx = pMouse.x - this.x;
                const dy = pMouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    this.x += dx * 0.0015;
                    this.y += dy * 0.0015;
                }
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width  + 5) this.x = -5;
                if (this.x < -5) this.x = canvas.width  + 5;
                if (this.y > canvas.height + 5) this.y = -5;
                if (this.y < -5) this.y = canvas.height + 5;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 210, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const count = Math.min(Math.floor(canvas.width * canvas.height / 14000), 110);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        const MAX_DIST = 140;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d  = Math.sqrt(dx * dx + dy * dy);
                    if (d < MAX_DIST) {
                        const alpha = 0.14 * (1 - d / MAX_DIST);
                        ctx.strokeStyle = `rgba(0, 210, 255, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
