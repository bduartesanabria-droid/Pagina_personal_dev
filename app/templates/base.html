<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYDS.DEV | Elevamos tu Presencia Digital</title>
    <meta name="description" content="Diseño y desarrollo web de alto impacto. Transformamos tu negocio en una potencia digital con estrategias ganadoras.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="main-bg"></div>

    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">BYDS<span>.DEV</span></a>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Beneficios</a></li>
                <li><a href="#proceso">Pasos</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <a href="https://wa.me/573114771700" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer style="padding: 100px 0; border-top: 1px solid var(--glass-border); text-align: center;">
        <div class="container">
            <a href="#" class="logo" style="margin-bottom: 2rem; display: inline-block;">BYDS<span>.DEV</span></a>
            <p style="color: var(--text-dim); margin-bottom: 3rem; max-width: 500px; margin: 0 auto 3rem;">Diseñamos el futuro de tu empresa, hoy mismo. Calidad sin compromisos.</p>
            <div style="display: flex; justify-content: center; gap: 3rem;">
                <a href="https://github.com/bduartesanabria-droid" target="_blank" style="color: white; font-size: 1.5rem;"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/byds.dev" target="_blank" style="color: white; font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                <a href="mailto:byds.dev@gmail.com" style="color: white; font-size: 1.5rem;"><i class="fas fa-envelope"></i></a>
            </div>
            <p style="margin-top: 4rem; color: var(--text-dim); font-size: 0.8rem;">&copy; 2026 BYDS.DEV. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
